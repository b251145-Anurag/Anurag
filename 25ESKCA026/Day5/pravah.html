<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pravah Fest Registration - Join the Flow!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        /* Define Variables for Consistency */
        :root {
            --primary-blue: #00A3E0;
            --secondary-blue: #0077C8;
            --primary-orange: #FF8F00;
            --text-dark: #2A2A2A;
            --bg-light: #F8F9FA;
            --white: #FFFFFF;
        }

        /* --- Global Styles --- */
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 0;
            color: var(--text-dark);
            line-height: 1.6;
        }

        h1, h2, h3 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
        }

        /* --- Hero Section --- */
        .hero {
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));
            color: var(--white);
            padding: 80px 20px;
            text-align: center;
        }

        .hero img {
            max-width: 450px;
            width: 100%;
            height: auto;
            margin-bottom: 20px;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto 30px auto;
        }

        .hero button {
            background-color: var(--primary-orange);
            color: var(--white);
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .hero button:hover {
            transform: scale(1.05);
            background-color: #E68100; /* Darker Orange */
        }

        /* --- Main Content --- */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* --- Form Section --- */
        #registration {
            background: var(--white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            margin-bottom: 50px;
        }

        .form-header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #EEEEEE;
            padding-bottom: 15px;
        }

        .form-header h2 {
            font-size: 1.8rem;
            margin: 0;
            margin-left: 15px;
        }

        .form-header img {
            width: 40px;
            height: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: flex;
            align-items: center;
            font-weight: 500;
            margin-bottom: 8px;
            color: #555;
        }

        .form-group label img {
            width: 20px;
            height: 20px;
            margin-right: 10px;
        }

        .form-group input, 
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #DDDDDD;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-blue);
        }

        /* --- Table Section --- */
        #registered-students h2 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 30px;
            color: #444;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 3px 15px rgba(0,0,0,0.05);
        }

        thead {
            background-color: var(--secondary-blue);
            color: var(--white);
        }

        th, td {
            padding: 15px 20px;
            text-align: left;
        }

        th {
            font-weight: 500;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tbody tr {
            border-bottom: 1px solid #EEEEEE;
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        tbody tr:hover {
            background-color: #FBFBFB;
        }

        .no-data {
            text-align: center;
            color: #999;
            font-style: italic;
            padding: 30px;
        }

        /* --- Footer --- */
        footer {
            text-align: center;
            padding: 30px 20px;
            font-size: 0.9rem;
            color: #888;
            border-top: 1px solid #EEEEEE;
            margin-top: 50px;
        }

    </style>
</head>
<body>

    <!-- Hero Section -->
    <header class="hero">
        <!-- SVG Hero Image -->
        <svg version="1.1" id="pravah-hero-svg" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px"
             viewBox="0 0 1000 600" style="enable-background:new 0 0 1000 600;" xml:space="preserve">
            <style type="text/css">
                .st0{fill:#00A3E0;} .st1{fill:#0077C8;} .st2{fill:#FF8F00;} .st3{fill:#FFFFFF;}
                @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }
                .st0 { animation: pulse 4s infinite ease-in-out; }
                .st1 { animation: pulse 5s infinite ease-in-out; }
            </style>
            <!-- Background Currents -->
            <path class="st0" d="M0,0v600h1000V0H0z M934,510c-33,18-72,27-111,27c-94,0-176-57-228-142l-2-4C545,313,472,271,390,271
                c-59,0-114,19-160,53l-6,5c-35,27-77,41-120,41c-77,0-146-44-184-110L0,227v283h1000V271L934,510z"/>
            <path class="st1" d="M1000,103l-26,45c-29,51-81,81-137,81c-60,0-116-29-148-77c-36-54-94-85-157-85c-60,0-114,30-149,81l-7,10
                C345,214,293,243,235,243c-62,0-119-32-154-86L0,103v168l66,91c38,66,107,110,184,110c43,0,85-14,120-41l6-5
                c46-34,101-53,160-53c82,0,155,42,203,120l2,4c52,85,134,142,228,142c39,0,78-9,111-27l66-239V103z"/>
            <!-- Central Dynamic Illustration -->
            <g transform="translate(180, 150) scale(0.65)">
                <circle class="st3" cx="500" cy="300" r="280" opacity="0.1"/>
                <circle class="st2" cx="500" cy="300" r="250"/>
                <path class="st3" d="M620,240c0-66-54-120-120-120S380,174,380,240c0,16,3,32,9,46l49,114c6,14,19,23,34,23
                    s28-9,34-23l49-114C617,272,620,256,620,240z"/>
                <g transform="translate(420, 160)">
                    <rect class="st2" x="10" y="30" width="30" height="30"/>
                    <rect class="st2" x="50" y="30" width="30" height="30"/>
                    <rect class="st2" x="90" y="30" width="30" height="30"/>
                    <path class="st3" d="M80,10H0v120h80V10z M60,110H20V30h40V110z"/>
                </g>
                <path class="st3" d="M500,430c72,0,130-58,130-130s-58-130-130-130s-130,58-130,130S428,430,500,430z M500,210c44,0,80,36,80,80
                    s-36,80-80,80s-80-36-80-80S456,210,500,210z"/>
            </g>
            <!-- Dynamic Elements/Icons -->
            <circle class="st3" cx="150" cy="150" r="20" opacity="0.6"/>
            <circle class="st3" cx="850" cy="450" r="15" opacity="0.4"/>
            <polygon class="st3" points="750,180 770,160 790,180 770,200" opacity="0.5"/>
            <polygon class="st3" points="250,480 270,460 290,480 270,500" opacity="0.3"/>
        </svg>

        <h1>Pravah Fest 2024</h1>
        <p>Ride the energy, showcase your talent, and connect with fellow creators. Join the most dynamic fest of the year!</p>
        <a href="#registration"><button>Register Now</button></a>
    </header>

    <div class="container">
        
        <!-- Registration Form -->
        <section id="registration">
            <div class="form-header">
                <!-- Registration Icon SVG -->
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 11C13.6569 11 15 9.65685 15 8C15 6.34315 13.6569 5 12 5C10.3431 5 9 6.34315 9 8C9 9.65685 10.3431 11 12 11Z" stroke="#0077C8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M16 19C16 17.3431 14.6569 16 13 16H11C9.34315 16 8 17.3431 8 19M16 19H8" stroke="#0077C8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <rect x="3" y="3" width="18" height="18" rx="2" stroke="#0077C8" stroke-width="2"/>
                </svg>
                <h2>Student Registration</h2>
            </div>
            <form id="regForm">
                <div class="form-group">
                    <label for="fullName">
                        <!-- User Icon -->
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 11C13.6569 11 15 9.65685 15 8C15 6.34315 13.6569 5 12 5C10.3431 5 9 6.34315 9 8C9 9.65685 10.3431 11 12 11Z" stroke="#777" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M16 19C16 17.3431 14.6569 16 13 16H11C9.34315 16 8 17.3431 8 19M16 19H8" stroke="#777" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        Full Name
                    </label>
                    <input type="text" id="fullName" required placeholder="Jane Doe">
                </div>
                <div class="form-group">
                    <label for="email">
                        <!-- Email Icon -->
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 8L10.89 13.26C11.56 13.71 12.44 13.71 13.11 13.26L21 8M5 19H19C20.1 19 21 18.1 21 17V7C21 5.9 20.1 5 19 5H5C3.9 5 3 5.9 3 7V17C3 18.1 3.9 19 5 19Z" stroke="#777" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        Email Address
                    </label>
                    <input type="email" id="email" required placeholder="jane.doe@example.com">
                </div>
                <div class="form-group">
                    <label for="event">
                        <!-- Event Icon -->
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 7V3M16 7V3M7 11H17M5 21H19C20.1046 21 21 20.1046 21 19V7C21 5.89543 20.1046 5 19 5H5C3.89543 5 3 5.89543 3 7V19C3 20.1046 3.89543 21 5 21Z" stroke="#777" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        Select Event
                    </label>
                    <select id="event" required>
                        <option value="">-- Choose an Event --</option>
                        <option value="Battle of the Bands">Battle of the Bands</option>
                        <option value="Code-a-Thon">Code-a-Thon</option>
                        <option value="Digital Art Showcase">Digital Art Showcase</option>
                        <option value="Dance Fest">Dance Fest</option>
                        <option value="Short Film Festival">Short Film Festival</option>
                    </select>
                </div>
                <button type="submit" style="background-color: var(--secondary-blue);">Confirm Registration</button>
            </form>
        </section>

        <!-- Registered Students Table -->
        <section id="registered-students">
            <h2>Participants List</h2>
            <table>
                <thead>
                    <tr>
                        <th>Participant Name</th>
                        <th>Email</th>
                        <th>Registered Event</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody">
                    <!-- Dynamic Content -->
                </tbody>
            </table>
        </section>

    </div>

    <footer>
        <p>&copy; 2024 Pravah Fest Committee. Catch the Flow!</p>
    </footer>

    <script>
        const regForm = document.getElementById('regForm');
        const studentTableBody = document.getElementById('studentTableBody');

        // Load existing data
        document.addEventListener('DOMContentLoaded', displayStudents);

        // Handle submission
        regForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const event = document.getElementById('event').value;

            const student = { name, email, event };

            let students = JSON.parse(localStorage.getItem('pravahStudents')) || [];
            students.push(student);
            localStorage.setItem('pravahStudents', JSON.stringify(students));

            regForm.reset();
            displayStudents();
        });

        // Display students
        function displayStudents() {
            let students = JSON.parse(localStorage.getItem('pravahStudents')) || [];
            studentTableBody.innerHTML = '';

            if (students.length === 0) {
                studentTableBody.innerHTML = `<tr><td colspan="3" class="no-data">No students registered yet. Be the first!</td></tr>`;
                return;
            }

            students.forEach(student => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${student.name}</td>
                    <td>${student.email}</td>
                    <td>${student.event}</td>
                `;
                studentTableBody.appendChild(row);
            });
        }
    </script>
</body>
</html>
