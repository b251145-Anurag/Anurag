<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="text-center mb-4">Student Records</h2>
        <input type="text" id="searchInput" class="form-control mb-4" placeholder="Search by name...">
        <div id="container" class="row g-4"></div>
        <div id="json"></div>
    </div>
    <script>
        const students=[
            {name:"Anurag", branch:"CSE", cgpa:9.9},
            {name:"Abhishek", branch:"CSE", cgpa:8.5},
            {name:"Ankit", branch:"CSE", cgpa:8.0},
            {name:"Anubhav", branch:"CSE", cgpa:6.2},
            {name:"Aarish", branch:"CSE", cgpa:8.9},
            {name:"Akshat", branch:"CSE", cgpa:8.7},
            {name:"Bhavesh", branch:"CSE", cgpa:9.1},
            {name:"Aditya", branch:"CSE", cgpa:8.3},
            {name:"Chiku", branch:"CSE", cgpa:0.9},
            {name:"Uncle", branch:"CSE", cgpa:3.9},
        ];
        let html = "";
        for (let i = 0; i < students.length; i++) {
            html += `
                <div class="col-md-4 card-item">
                    <div class="card shadow">
                         <div class="card-body">
                            <h4>${students[i].name}</h4>
                            <button class="btn btn-primary btn-sm mt-2" >
                                Show Details
                            </button>

                             <div class="details mt-3" style="display: none;">
                                <p><strong>Branch:</strong> ${students[i].branch}</p>
                                <p><strong>CGPA:</strong> ${students[i].cgpa}</p>
                            </div>
                         </div>
                     </div>
                 </div>
            `;
        }
        document.getElementById("container").innerHTML=html;
        $(document).on("click", ".btn", function() {
            $(this).siblings(".details").slideToggle();
        });
        $("#searchInput").on("input", function() {
            const searchTerm = $(this).val().toLowerCase();
            $(".card-item").each(function() {
                const name = $(this).find("h4").text().toLowerCase();
                if (name.includes(searchTerm)) {
                    $(this).show();
                } else {
                    $(this).hide();
                }
            });
        });
        document.getElementById("json").innerHTML = JSON.stringify(students,replacer, 2);
        function replacer(key, value) {
            if (key === "branch") {
                return undefined;
            }
            return value;
        }
    </script>


</body>
</html>
